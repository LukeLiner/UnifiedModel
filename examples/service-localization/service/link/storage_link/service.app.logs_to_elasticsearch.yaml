kind: storage_link
schema:
  url: "umodel.aliyun.com"
  version: "v1.0.0"
metadata:
  name: "service.app.logs_to_elasticsearch"
  domain: service
  display_name:
    en_us: "Service logs stored in Elasticsearch"
    zh_cn: "服务日志存储在 Elasticsearch"
spec:
  src:
    domain: service
    kind: log_set
    name: service.app.logs
  dest:
    domain: service
    kind: elasticsearch
    name: localization.elasticsearch.logs
  fields_mapping:
    timestamp: timestamp
    target_id: svc_id
    environment: env
    level: severity
    message: log_message
    trace_id: trace_id
