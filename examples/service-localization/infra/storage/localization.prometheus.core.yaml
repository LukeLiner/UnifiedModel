kind: prometheus
schema:
  url: "umodel.aliyun.com"
  version: "v1.0.0"
metadata:
  name: "localization.prometheus.core"
  domain: infra
  display_name:
    en_us: "Localization Prometheus"
    zh_cn: "定位 Demo Prometheus"
  description:
    en_us: "Prometheus-compatible metrics endpoint shared by all metric sets in the service-localization demo."
    zh_cn: "service-localization Demo 中所有指标集共享的 Prometheus 兼容指标端点。"
spec:
  endpoint: "http://prometheus.localization.example:9090"
  api_prefix: "/api/v1"
  default_query_type: range
  default_step: 1m
  lookback_delta: 5m
  tenant: service-localization
  tenant_header: "X-Scope-OrgID"
  tls_verify: true
  external_labels:
    workspace: service-localization
  tags:
    sample: service-localization
    role: metrics
