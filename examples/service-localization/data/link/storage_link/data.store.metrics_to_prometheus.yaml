kind: storage_link
schema:
  url: "umodel.aliyun.com"
  version: "v1.0.0"
metadata:
  name: "data.store.metrics_to_prometheus"
  domain: data
  display_name:
    en_us: "Store metrics stored in Prometheus"
    zh_cn: "存储指标存储在 Prometheus"
spec:
  src:
    domain: data
    kind: metric_set
    name: data.store.metrics
  dest:
    domain: infra
    kind: prometheus
    name: localization.prometheus.core
  fields_mapping:
    target_id: target_id
    environment: environment
