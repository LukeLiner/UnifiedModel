    "primary_key_fields": [
      "server_id"
    ],
    "id_generator": "lower(to_hex(md5(cast(server_id as varbinary))))",
    "name_fields": [
      "server_name",
      "region",
      "status"
    ],
    "ordered_fields": [
      "server_name",
      "status"
    ],
    "first_observed_time_field": "__first_observed_time__",
    "last_observed_time_field": "__last_observed_time__"
  }
