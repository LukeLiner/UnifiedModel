kind: entity_set
schema:
  url: "umodel.aliyun.com"
  version: "v0.1.0"
metadata:
  name: "k8s.workload"
  domain: k8s
  display_name:
    en_us: "Kubernetes Workload"
    zh_cn: "Kubernetes 工作负载"
  description:
    en_us: "A coarse workload abstraction such as Deployment or StatefulSet."
    zh_cn: "Deployment 或 StatefulSet 等粗粒度工作负载抽象。"
spec:
  fields:
    - name: id
      type: string
      display_name:
        en_us: "ID"
        zh_cn: "ID"
      description:
        en_us: "Stable entity identifier."
        zh_cn: "稳定实体标识。"
    - name: display_name
      type: string
      display_name:
        en_us: "Name"
        zh_cn: "名称"
      description:
        en_us: "Human-readable name."
        zh_cn: "可读名称。"
    - name: status
      type: string
      display_name:
        en_us: "Status"
        zh_cn: "状态"
      description:
        en_us: "Current lifecycle status."
        zh_cn: "当前生命周期状态。"
    - name: owner
      type: string
      display_name:
        en_us: "Owner"
        zh_cn: "负责人"
      description:
        en_us: "Owning team or person."
        zh_cn: "负责人或团队。"
    - name: cluster
      type: string
      display_name:
        en_us: "Cluster"
        zh_cn: "集群"
      description:
        en_us: "Related cluster."
        zh_cn: "关联集群。"
    - name: namespace
      type: string
      display_name:
        en_us: "Namespace"
        zh_cn: "命名空间"
      description:
        en_us: "Kubernetes namespace."
        zh_cn: "Kubernetes 命名空间。"
    - name: kind
      type: string
      display_name:
        en_us: "Kind"
        zh_cn: "类型"
      description:
        en_us: "Coarse object kind."
        zh_cn: "粗粒度对象类型。"
    - name: image
      type: string
      display_name:
        en_us: "Image"
        zh_cn: "镜像"
      description:
        en_us: "Primary container image."
        zh_cn: "主要容器镜像。"
    - name: replicas
      type: integer
      display_name:
        en_us: "Replicas"
        zh_cn: "副本数"
      description:
        en_us: "Desired replica count."
        zh_cn: "期望副本数量。"
    - name: ready_replicas
      type: integer
      display_name:
        en_us: "Ready Replicas"
        zh_cn: "就绪副本"
      description:
        en_us: "Ready replica count."
        zh_cn: "就绪副本数量。"
    - name: rollout_strategy
      type: string
      display_name:
        en_us: "Rollout Strategy"
        zh_cn: "发布策略"
      description:
        en_us: "Rollout strategy."
        zh_cn: "发布策略。"
    - name: resource_profile
      type: string
      display_name:
        en_us: "Resource Profile"
        zh_cn: "资源画像"
      description:
        en_us: "Coarse resource sizing profile."
        zh_cn: "粗粒度资源规格画像。"
    - name: business_value
      type: string
      display_name:
        en_us: "Business Value"
        zh_cn: "业务价值"
      description:
        en_us: "Why this object matters."
        zh_cn: "该对象的业务价值。"
  primary_key_fields:
    - id
  id_generator: "id"
  name_fields:
    - display_name
  ordered_fields: ["id", "display_name", "status", "owner", "cluster", "namespace", "kind", "replicas"]
  first_observed_time_field: "__first_observed_time__"
  last_observed_time_field: "__last_observed_time__"
