kind: entity_set
schema:
  url: "umodel.aliyun.com"
  version: "v0.1.0"
metadata:
  name: "k8s.namespace"
  domain: k8s
  display_name:
    en_us: "Kubernetes Namespace"
    zh_cn: "Kubernetes 命名空间"
  description:
    en_us: "A coarse Kubernetes namespace boundary."
    zh_cn: "粗粒度 Kubernetes 命名空间边界。"
spec:
  fields:
    - name: id
      type: string
      display_name:
        en_us: "ID"
        zh_cn: "ID"
      description:
        en_us: "Stable entity identifier."
        zh_cn: "稳定实体标识。"
    - name: display_name
      type: string
      display_name:
        en_us: "Name"
        zh_cn: "名称"
      description:
        en_us: "Human-readable name."
        zh_cn: "可读名称。"
    - name: status
      type: string
      display_name:
        en_us: "Status"
        zh_cn: "状态"
      description:
        en_us: "Current lifecycle status."
        zh_cn: "当前生命周期状态。"
    - name: cluster
      type: string
      display_name:
        en_us: "Cluster"
        zh_cn: "集群"
      description:
        en_us: "Related cluster."
        zh_cn: "关联集群。"
    - name: environment
      type: string
      display_name:
        en_us: "Environment"
        zh_cn: "环境"
      description:
        en_us: "Mapped delivery environment."
        zh_cn: "映射的交付环境。"
    - name: owner
      type: string
      display_name:
        en_us: "Owner"
        zh_cn: "负责人"
      description:
        en_us: "Owning team or person."
        zh_cn: "负责人或团队。"
    - name: quota_cpu
      type: string
      display_name:
        en_us: "CPU Quota"
        zh_cn: "CPU 配额"
      description:
        en_us: "Namespace CPU quota."
        zh_cn: "命名空间 CPU 配额。"
    - name: quota_memory
      type: string
      display_name:
        en_us: "Memory Quota"
        zh_cn: "内存配额"
      description:
        en_us: "Namespace memory quota."
        zh_cn: "命名空间内存配额。"
    - name: cost_center
      type: string
      display_name:
        en_us: "Cost Center"
        zh_cn: "成本中心"
      description:
        en_us: "Cost allocation identifier."
        zh_cn: "成本归属标识。"
  primary_key_fields:
    - id
  id_generator: "id"
  name_fields:
    - display_name
  ordered_fields: ["id", "display_name", "status", "cluster", "environment", "owner"]
  first_observed_time_field: "__first_observed_time__"
  last_observed_time_field: "__last_observed_time__"
