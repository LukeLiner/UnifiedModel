kind: entity_set
schema:
  url: "umodel.aliyun.com"
  version: "v0.1.0"
metadata:
  name: "devops.environment"
  domain: devops
  display_name:
    en_us: "Environment"
    zh_cn: "环境"
  description:
    en_us: "A delivery or runtime environment such as staging or production."
    zh_cn: "交付或运行环境，例如 staging 或 production。"
spec:
  fields:
    - name: id
      type: string
      display_name:
        en_us: "ID"
        zh_cn: "ID"
      description:
        en_us: "Stable entity identifier."
        zh_cn: "稳定实体标识。"
    - name: display_name
      type: string
      display_name:
        en_us: "Name"
        zh_cn: "名称"
      description:
        en_us: "Human-readable name."
        zh_cn: "可读名称。"
    - name: status
      type: string
      display_name:
        en_us: "Status"
        zh_cn: "状态"
      description:
        en_us: "Current lifecycle status."
        zh_cn: "当前生命周期状态。"
    - name: tier
      type: string
      display_name:
        en_us: "Tier"
        zh_cn: "层级"
      description:
        en_us: "Environment tier."
        zh_cn: "环境层级。"
    - name: region
      type: string
      display_name:
        en_us: "Region"
        zh_cn: "地域"
      description:
        en_us: "Primary runtime region."
        zh_cn: "主要运行地域。"
    - name: namespace
      type: string
      display_name:
        en_us: "Namespace"
        zh_cn: "命名空间"
      description:
        en_us: "Mapped Kubernetes namespace."
        zh_cn: "映射的 Kubernetes 命名空间。"
    - name: approval_policy
      type: string
      display_name:
        en_us: "Approval Policy"
        zh_cn: "审批策略"
      description:
        en_us: "Deployment approval policy."
        zh_cn: "部署审批策略。"
    - name: change_freeze
      type: boolean
      display_name:
        en_us: "Change Freeze"
        zh_cn: "变更冻结"
      description:
        en_us: "Whether regular changes are frozen."
        zh_cn: "是否冻结常规变更。"
    - name: capacity_class
      type: string
      display_name:
        en_us: "Capacity Class"
        zh_cn: "容量规格"
      description:
        en_us: "Expected capacity class."
        zh_cn: "预期容量规格。"
  primary_key_fields:
    - id
  id_generator: "id"
  name_fields:
    - display_name
  ordered_fields: ["id", "display_name", "status", "tier", "region", "namespace", "approval_policy"]
  first_observed_time_field: "__first_observed_time__"
  last_observed_time_field: "__last_observed_time__"
