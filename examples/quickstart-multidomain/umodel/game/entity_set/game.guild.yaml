    "primary_key_fields": [
      "guild_id"
    ],
    "id_generator": "lower(to_hex(md5(cast(guild_id as varbinary))))",
    "name_fields": [
      "guild_name",
      "server_id",
      "status"
    ],
    "ordered_fields": [
      "guild_name",
      "status"
    ],
    "first_observed_time_field": "__first_observed_time__",
    "last_observed_time_field": "__last_observed_time__"
  }
