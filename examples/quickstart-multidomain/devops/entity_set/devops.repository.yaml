kind: entity_set
schema:
  url: "umodel.aliyun.com"
  version: "v0.1.0"
metadata:
  name: "devops.repository"
  domain: devops
  display_name:
    en_us: "Repository"
    zh_cn: "代码仓库"
  description:
    en_us: "A source code repository for a service."
    zh_cn: "服务对应的源码仓库。"
spec:
  fields:
    - name: id
      type: string
      display_name:
        en_us: "ID"
        zh_cn: "ID"
      description:
        en_us: "Stable entity identifier."
        zh_cn: "稳定实体标识。"
    - name: display_name
      type: string
      display_name:
        en_us: "Name"
        zh_cn: "名称"
      description:
        en_us: "Human-readable name."
        zh_cn: "可读名称。"
    - name: status
      type: string
      display_name:
        en_us: "Status"
        zh_cn: "状态"
      description:
        en_us: "Current lifecycle status."
        zh_cn: "当前生命周期状态。"
    - name: owner
      type: string
      display_name:
        en_us: "Owner"
        zh_cn: "负责人"
      description:
        en_us: "Owning team or person."
        zh_cn: "负责人或团队。"
    - name: repo_url
      type: string
      display_name:
        en_us: "Repository URL"
        zh_cn: "仓库地址"
      description:
        en_us: "Source repository URL or path."
        zh_cn: "源码仓库地址或路径。"
    - name: default_branch
      type: string
      display_name:
        en_us: "Default Branch"
        zh_cn: "默认分支"
      description:
        en_us: "Default development branch."
        zh_cn: "默认开发分支。"
    - name: language
      type: string
      display_name:
        en_us: "Language"
        zh_cn: "语言"
      description:
        en_us: "Primary repository language."
        zh_cn: "仓库主要语言。"
    - name: service_name
      type: string
      display_name:
        en_us: "Service Name"
        zh_cn: "服务名称"
      description:
        en_us: "Service implemented by this repository."
        zh_cn: "该仓库实现的服务。"
    - name: criticality
      type: string
      display_name:
        en_us: "Criticality"
        zh_cn: "关键等级"
      description:
        en_us: "Business criticality level."
        zh_cn: "业务关键等级。"
    - name: compliance_level
      type: string
      display_name:
        en_us: "Compliance Level"
        zh_cn: "合规级别"
      description:
        en_us: "Compliance or review requirement level."
        zh_cn: "合规或评审要求级别。"
    - name: business_value
      type: string
      display_name:
        en_us: "Business Value"
        zh_cn: "业务价值"
      description:
        en_us: "Why this object matters."
        zh_cn: "该对象的业务价值。"
  primary_key_fields:
    - id
  id_generator: "id"
  name_fields:
    - display_name
  ordered_fields: ["id", "display_name", "status", "owner", "language", "criticality"]
  first_observed_time_field: "__first_observed_time__"
  last_observed_time_field: "__last_observed_time__"
