kind: metric_set
schema:
  url: "umodel.aliyun.com"
  version: "v1.0.0"
metadata:
  name: "platform.service.metrics"
  domain: platform
  display_name:
    en_us: "Service Metrics"
    zh_cn: "服务指标"
  description:
    en_us: "Golden metrics for platform services in the incident-investigation demo. Lets an agent pull the actual latency, throughput, and error signals during diagnosis."
    zh_cn: "故障排查 Demo 中平台服务的黄金指标。让 Agent 在诊断过程中拉取真实的延迟、吞吐与错误信号。"
spec:
  labels:
    keys:
      - name: service_id
        type: string
        display_name:
          en_us: "Service ID"
          zh_cn: "服务 ID"
      - name: environment
        type: string
        display_name:
          en_us: "Environment"
          zh_cn: "环境"
    dynamic: false
  metrics:
    - name: latency_p99_ms
      display_name:
        en_us: "P99 Latency"
        zh_cn: "P99 延迟"
      unit: ms
      data_format: ms
      type: gauge
      query_mode: range
      generator: "histogram_quantile(0.99, sum(rate(platform_service_request_duration_seconds_bucket{service_id=\"$service_id\"}[1m])) by (le)) * 1000"
      aggregator: avg
      golden_metric: true
    - name: request_qps
      display_name:
        en_us: "Request QPS"
        zh_cn: "请求 QPS"
      unit: count
      data_format: KMB
      type: gauge
      query_mode: range
      generator: "sum(rate(platform_service_request_total{service_id=\"$service_id\"}[1m]))"
      aggregator: sum
      golden_metric: true
    - name: error_rate
      display_name:
        en_us: "Error Rate"
        zh_cn: "错误率"
      unit: percent
      data_format: percent
      type: gauge
      query_mode: range
      generator: "sum(rate(platform_service_error_total{service_id=\"$service_id\"}[1m])) / sum(rate(platform_service_request_total{service_id=\"$service_id\"}[1m]))"
      aggregator: avg
      golden_metric: true
  query_type: prom
  needs_processing: true
