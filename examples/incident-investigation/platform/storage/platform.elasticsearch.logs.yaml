kind: elasticsearch
schema:
  url: "umodel.aliyun.com"
  version: "v1.0.0"
metadata:
  name: "platform.elasticsearch.logs"
  domain: platform
  display_name:
    en_us: "Platform Elasticsearch Logs"
    zh_cn: "Platform Elasticsearch 日志"
  description:
    en_us: "Elasticsearch-compatible log index used by the incident-investigation service log set."
    zh_cn: "故障排查 Demo 服务日志集使用的 Elasticsearch 兼容日志索引。"
spec:
  endpoint: "https://elasticsearch.platform.example:9200"
  index: "platform-service-logs-*"
  index_pattern: "platform-service-logs-${yyyy.MM.dd}"
  version: "8.x"
  query_dialect: elasticsearch_dsl
  time_field: timestamp
  default_size: 1000
  max_size: 10000
  tls_verify: true
  tags:
    sample: incident-investigation
    role: logs
