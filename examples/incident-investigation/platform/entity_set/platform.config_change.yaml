kind: entity_set
schema:
  url: "umodel.aliyun.com"
  version: "v0.1.0"
metadata:
  name: "platform.config_change"
  domain: platform
  display_name:
    en_us: "Config Change"
    zh_cn: "配置变更"
  description:
    en_us: "A runtime configuration change applied to a service."
    zh_cn: "应用于服务的运行时配置变更。"
spec:
  fields:
    - name: id
      type: string
      display_name: { en_us: "ID", zh_cn: "ID" }
    - name: display_name
      type: string
      display_name: { en_us: "Name", zh_cn: "名称" }
    - name: target_service
      type: string
      display_name: { en_us: "Target Service", zh_cn: "目标服务" }
    - name: change_type
      type: string
      display_name: { en_us: "Change Type", zh_cn: "变更类型" }
      description:
        en_us: "runtime_config, feature_flag, or env_var."
        zh_cn: "runtime_config、feature_flag 或 env_var。"
    - name: change_detail
      type: string
      display_name: { en_us: "Change Detail", zh_cn: "变更详情" }
      description:
        en_us: "Human-readable diff of what changed."
        zh_cn: "变更内容的可读描述。"
    - name: reason
      type: string
      display_name: { en_us: "Reason", zh_cn: "变更原因" }
    - name: author
      type: string
      display_name: { en_us: "Author", zh_cn: "变更人" }
    - name: approved_by
      type: string
      display_name: { en_us: "Approved By", zh_cn: "审批人" }
    - name: applied_at
      type: string
      display_name: { en_us: "Applied At", zh_cn: "生效时间" }
    - name: rollback_available
      type: string
      display_name: { en_us: "Rollback Available", zh_cn: "可否回滚" }
    - name: risk_level
      type: string
      display_name: { en_us: "Risk Level", zh_cn: "风险级别" }
    - name: status
      type: string
      display_name: { en_us: "Status", zh_cn: "状态" }
  primary_key_fields:
    - id
  id_generator: "id"
  name_fields:
    - display_name
  ordered_fields: ["id", "display_name", "target_service", "change_type", "applied_at", "status"]
  first_observed_time_field: "__first_observed_time__"
  last_observed_time_field: "__last_observed_time__"
