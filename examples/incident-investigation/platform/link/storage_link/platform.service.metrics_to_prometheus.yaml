kind: storage_link
schema:
  url: "umodel.aliyun.com"
  version: "v1.0.0"
metadata:
  name: "platform.service.metrics_to_prometheus"
  domain: platform
  display_name:
    en_us: "Service metrics stored in Prometheus"
    zh_cn: "服务指标存储在 Prometheus"
spec:
  src:
    domain: platform
    kind: metric_set
    name: platform.service.metrics
  dest:
    domain: platform
    kind: prometheus
    name: platform.prometheus.core
  fields_mapping:
    service_id: service_id
    environment: environment
