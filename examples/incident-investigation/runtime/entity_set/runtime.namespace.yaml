kind: entity_set
schema:
  url: "umodel.aliyun.com"
  version: "v0.1.0"
metadata:
  name: "runtime.namespace"
  domain: runtime
  display_name:
    en_us: "Namespace"
    zh_cn: "命名空间"
  description:
    en_us: "A Kubernetes namespace grouping workloads."
    zh_cn: "分组工作负载的 Kubernetes 命名空间。"
spec:
  fields:
    - name: id
      type: string
      display_name: { en_us: "ID", zh_cn: "ID" }
    - name: display_name
      type: string
      display_name: { en_us: "Name", zh_cn: "名称" }
    - name: cluster
      type: string
      display_name: { en_us: "Cluster", zh_cn: "所属集群" }
    - name: purpose
      type: string
      display_name: { en_us: "Purpose", zh_cn: "用途" }
    - name: status
      type: string
      display_name: { en_us: "Status", zh_cn: "状态" }
  primary_key_fields:
    - id
  id_generator: "id"
  name_fields:
    - display_name
  ordered_fields: ["id", "display_name", "cluster", "purpose", "status"]
  first_observed_time_field: "__first_observed_time__"
  last_observed_time_field: "__last_observed_time__"
