kind: entity_set
schema:
  url: "umodel.aliyun.com"
  version: "v0.1.0"
metadata:
  name: "runtime.pod"
  domain: runtime
  display_name:
    en_us: "Pod"
    zh_cn: "Pod"
  description:
    en_us: "A Kubernetes pod instance."
    zh_cn: "Kubernetes Pod 实例。"
spec:
  fields:
    - name: id
      type: string
      display_name: { en_us: "ID", zh_cn: "ID" }
    - name: display_name
      type: string
      display_name: { en_us: "Name", zh_cn: "名称" }
    - name: workload
      type: string
      display_name: { en_us: "Workload", zh_cn: "工作负载" }
    - name: node
      type: string
      display_name: { en_us: "Node", zh_cn: "节点" }
    - name: status
      type: string
      display_name: { en_us: "Status", zh_cn: "状态" }
    - name: restart_count
      type: string
      display_name: { en_us: "Restart Count", zh_cn: "重启次数" }
    - name: cpu_usage_percent
      type: string
      display_name: { en_us: "CPU Usage %", zh_cn: "CPU 使用率%" }
    - name: memory_usage_mb
      type: string
      display_name: { en_us: "Memory Usage MB", zh_cn: "内存使用MB" }
  primary_key_fields:
    - id
  id_generator: "id"
  name_fields:
    - display_name
  ordered_fields: ["id", "display_name", "workload", "status", "restart_count", "cpu_usage_percent", "memory_usage_mb"]
  first_observed_time_field: "__first_observed_time__"
  last_observed_time_field: "__last_observed_time__"
