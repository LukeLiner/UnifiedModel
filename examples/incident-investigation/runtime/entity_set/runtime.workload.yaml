kind: entity_set
schema:
  url: "umodel.aliyun.com"
  version: "v0.1.0"
metadata:
  name: "runtime.workload"
  domain: runtime
  display_name:
    en_us: "Workload"
    zh_cn: "工作负载"
  description:
    en_us: "A Kubernetes workload (Deployment/StatefulSet) running a service."
    zh_cn: "运行服务的 Kubernetes 工作负载（Deployment/StatefulSet）。"
spec:
  fields:
    - name: id
      type: string
      display_name: { en_us: "ID", zh_cn: "ID" }
    - name: display_name
      type: string
      display_name: { en_us: "Name", zh_cn: "名称" }
    - name: namespace
      type: string
      display_name: { en_us: "Namespace", zh_cn: "命名空间" }
    - name: workload_type
      type: string
      display_name: { en_us: "Type", zh_cn: "类型" }
      description:
        en_us: "Deployment, StatefulSet, DaemonSet."
        zh_cn: "Deployment、StatefulSet、DaemonSet。"
    - name: replicas_desired
      type: string
      display_name: { en_us: "Desired Replicas", zh_cn: "期望副本数" }
    - name: replicas_ready
      type: string
      display_name: { en_us: "Ready Replicas", zh_cn: "就绪副本数" }
    - name: cpu_request
      type: string
      display_name: { en_us: "CPU Request", zh_cn: "CPU 请求" }
    - name: memory_limit
      type: string
      display_name: { en_us: "Memory Limit", zh_cn: "内存限制" }
    - name: hpa_max
      type: string
      display_name: { en_us: "HPA Max", zh_cn: "HPA 最大副本" }
    - name: status
      type: string
      display_name: { en_us: "Status", zh_cn: "状态" }
  primary_key_fields:
    - id
  id_generator: "id"
  name_fields:
    - display_name
  ordered_fields: ["id", "display_name", "namespace", "workload_type", "replicas_desired", "replicas_ready", "status"]
  first_observed_time_field: "__first_observed_time__"
  last_observed_time_field: "__last_observed_time__"
