kind: entity_set
schema:
  url: "umodel.aliyun.com"
  version: "v0.1.0"
metadata:
  name: "business.order_flow"
  domain: business
  display_name:
    en_us: "Order Flow"
    zh_cn: "订单流程"
  description:
    en_us: "A business order processing flow that depends on platform services."
    zh_cn: "依赖平台服务的业务订单处理流程。"
spec:
  fields:
    - name: id
      type: string
      display_name: { en_us: "ID", zh_cn: "ID" }
    - name: display_name
      type: string
      display_name: { en_us: "Name", zh_cn: "名称" }
    - name: steps
      type: string
      display_name: { en_us: "Steps", zh_cn: "步骤" }
    - name: depends_on_services
      type: string
      display_name: { en_us: "Depends On Services", zh_cn: "依赖服务" }
    - name: status
      type: string
      display_name: { en_us: "Status", zh_cn: "状态" }
      description:
        en_us: "healthy, impacted, down."
        zh_cn: "healthy、impacted、down。"
    - name: error_rate
      type: string
      display_name: { en_us: "Error Rate", zh_cn: "错误率" }
    - name: owner
      type: string
      display_name: { en_us: "Owner", zh_cn: "负责人" }
  primary_key_fields:
    - id
  id_generator: "id"
  name_fields:
    - display_name
  ordered_fields: ["id", "display_name", "status", "error_rate", "depends_on_services"]
  first_observed_time_field: "__first_observed_time__"
  last_observed_time_field: "__last_observed_time__"
