name: umodel_lint_rules
validation_rules:
  #  文件名校验
  - name: "实体文件名校验"
    value: "$filename"
    type: "format"
    format: "{name}.yaml"
    format_constraints:
      name:
        equals: "$.metadata.name"
    message: "🔴 文件名不符合命名规范：必须和name保持一致"

  - name: "实体集名称基础模式校验"
    when: "kind == 'entity_set'"
    type: "pattern"
    value: "$.metadata.name"
    pattern: '^[a-z][a-z0-9_\.]*$'
    message: "🔴 实体集名称不符合命名规范：必须以小写字母开头，只能包含小写字母、数字、下划线和点号"

  - name: "实体集名称格式校验"
    when: "kind == 'entity_set'"
    type: "format"
    value: "$.metadata.name"
    format: "{domain}.{entity}"
    format_constraints:
      domain:
        equals: "$.metadata.domain"
      entity:
        regex: '[a-z][a-z0-9_\.]*'
    message: "🔴 实体集名称格式错误：应为 {domain}.{entity} 格式，域名需与metadata.domain一致，实体名只能包含小写字母、数字和下划线"

  - name: "数据集名称基础模式校验"
    when: "kind in ['trace_set', 'metric_set', 'log_set', 'event_set']"
    type: "pattern"
    value: "$.metadata.name"
    pattern: '^[a-z][a-z0-9_\.]*$'
    message: "🔴 数据集名称不符合命名规范：必须以小写字母开头，只能包含小写字母、数字、下划线和点号"

  - name: "数据集名称格式校验"
    when: "kind in ['trace_set', 'metric_set', 'log_set', 'event_set']"
    type: "format"
    value: "$.metadata.name"
    format: "{domain}.{type}.{name}"
    format_constraints:
      domain:
        equals: "$.metadata.domain"
      type:
        in: ["trace", "metric", "log", "event"]
      name:
        regex: '[a-z][a-z0-9_\.]*'
    message: "🔴 数据集名称格式错误：应为 {domain}.{type}.{name} 格式，类型需为trace/metric/log/event之一，name只能包含小写字母、数字、下划线和点号"

  # ===== 实体链接校验规则 =====
  - name: "实体链接名称基础模式校验"
    when: "kind == 'entity_set_link'"
    type: "pattern"
    value: "$.metadata.name"
    pattern: '^[a-z][a-z0-9_\.]*$'
    message: "🔴 实体链接名称不符合命名规范：必须以小写字母开头，只能包含小写字母、数字、下划线和点号"

  - name: "实体链接可选值校验"
    when: "kind == 'entity_set_link'"
    type: "pattern"
    value: "$.spec.entity_link_type"
    pattern: '^(calls|hosts|contains|same_as|related_to)$'
    message: "🔴 实体链接类型可选值错误：应为 calls/hosts/contains/same_as/related_to 之一"

  - name: "实体链接名称格式校验"
    when: "kind == 'entity_set_link'"
    type: "format"
    value: "$.metadata.name"
    format: "{src_name}_{link_type}_{dest_name}"
    format_constraints:
      src_name:
        equals: "$.spec.src.name"
      dest_name:
        equals: "$.spec.dest.name"
      link_type:
        equals: "$.spec.entity_link_type"
    message: "🔴 实体链接名称格式错误：应为 {源实体}_{链接类型}_{目标实体} 格式，需与spec字段一致"

  # ===== 数据链接校验规则 =====
  - name: "数据链接名称基础模式校验"
    when: "kind == 'data_link'"
    type: "pattern"
    value: "$.metadata.name"
    pattern: '^[a-z][a-z0-9_\.]*$'
    message: "🔴 数据链接名称不符合命名规范：必须以小写字母开头，只能包含小写字母、数字、下划线和点号"

  - name: "数据链接名称格式校验"
    when: "kind == 'data_link'"
    type: "format"
    value: "$.metadata.name"
    format: "{src_name}_{link_type}_{dest_name}"
    format_constraints:
      src_name:
        equals: "$.spec.src.name"
      dest_name:
        equals: "$.spec.dest.name"
      link_type:
        equals: "$.spec.data_link_type"
    message: "🔴 数据链接名称格式错误：应为 {源对象}_{链接类型}_{目标数据集} 格式，需与spec字段一致"

  # ===== 引用完整性校验 =====
  - name: "源数据集引用校验"
    when: "kind in ['entity_set_link', 'data_link']"
    type: "telemetry_data_set_exists"
    value: "$.spec.src.name"
    message: "🔴 引用的源数据集（Entity/DataSet） '{value}' 不存在，请检查数据集定义文件"

  - name: "目标数据集引用校验"
    when: "kind in ['entity_set_link', 'data_link']"
    type: "telemetry_data_set_exists"
    value: "$.spec.dest.name"
    message: "🔴 引用的目标数据集（Entity/DataSet） '{value}' 不存在，请检查数据集定义文件"

  - name: "域名字段格式校验"
    when: "kind in ['entity_set', 'trace_set', 'metric_set', 'log_set', 'event_set']"
    type: "pattern"
    value: "$.metadata.domain"
    pattern: '^[a-z][a-z0-9_]*$'
    message: "⚠️ 域名字段格式不规范：建议使用小写字母开头，只包含字母、数字和下划线"
    level: "warning" 