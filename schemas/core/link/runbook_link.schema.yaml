description: 
  zh_cn: RunbookLink 用于定义实体集合与操作手册集合之间的关联关系。
  en_us: RunbookLink is used to define the relationship between entity sets and runbook sets.
name: runbook_link
versions:
  - name: v1.0.0
    spec:
      type: object
      properties:
        kind:
          type: string
          constraint:
            required: true
            enum:
              values:
                - runbook_link
        schema:
          type: object
          extends:
            - schema:v1
          constraint:
            required: true
        metadata:
          type: object
          extends:
            - metadata:v1
          constraint:
            required: true
        spec:
          type: object
          constraint:
            required: true
          description: 
            zh_cn: RunbookLink 的核心配置部分，定义关联关系。
            en_us: The specification section containing RunbookLink configuration.
          extends:
            - link:v1
          properties:
            token_replace:
              type: map
              description: 
                zh_cn: 上下文变量的映射关系，用于在执行 Runbook 时提供动态上下文变量。
                en_us: The mapping relationship of context variables, used to provide dynamic context variables when executing the Runbook.
            fields_mapping:
              description: 
                zh_cn: 源数据集字段到目标 Runbook 字段的映射关系，用于将数据集中的字段值传递给 Runbook 的输入参数。
                en_us: The field mapping from source dataset fields to destination Runbook fields, used to pass field values from the dataset to Runbook input parameters.
              type: map
              constraint:
                map:
                  key:
                    description: 
                      zh_cn: 源数据集（EntitySet 或 DataSet）的字段名称。
                      en_us: The field name of the source dataset (EntitySet or DataSet).
                    type: string
                  value:
                    description: 
                      zh_cn: 目标 Runbook 的输入参数名称。
                      en_us: The input parameter name of the destination Runbook.
                    type: string