description: 
  zh_cn: SLS MetricStore 存储，一般用于存储指标数据。
  en_us: SLS MetricStore storage, usually used to store metric data.
name: sls_metricstore
versions:
  - name: v1.0.0
    spec:
      type: object
      properties:
        kind:
          type: string
          constraint:
            required: true
            enum:
              values:
                - sls_metricstore
        schema:
          type: object
          extends:
            - schema:v1
          constraint:
            required: true
        metadata:
          type: object
          extends:
            - metadata:v1
          constraint:
            required: true
        spec:
          type: object
          constraint:
            required: true
          properties:
            region:
              description: 
                zh_cn: SLS MetricStore 的区域。
                en_us: The region of the SLS MetricStore.
              type: string
              constraint:
                #pattern "^[a-z0-9-]*$"
                required: true
            project:
              description: 
                zh_cn: SLS MetricStore 的项目。
                en_us: The project of the SLS MetricStore.
              type: string
              constraint:
                #pattern '^[\w-]*$'
                required: true
            store:
              description: 
                zh_cn: SLS MetricStore 的名称。
                en_us: The name of the SLS MetricStore.
              type: string
              constraint:
                #pattern '^[\w-]*$'
                required: true
