description: 
  zh_cn: 字段是日志、指标、追踪、实体等数据的最基本定义，是数据的基本单位。
  en_us: >
    The most basic definition of a field, which is the fundamental unit of data for logs, metrics, traces, entities, etc.
name: field_spec
versions:
  - name: v1
    spec:
      type: object
      properties:
        name:
          description: 
            zh_cn: Field 在 UModel 系统中的名称。值不能为空。值格式为小写字母数字字符。
            en_us: >
              The name of the Field in UModel System. The value cannot be empty.The value format is lowercase alphanumeric characters.
          type: string
          constraint:
            pattern: '^[a-zA-Z0-9_][a-zA-Z0-9-_\.:]{0,127}$'
            required: true
            min_len: 0
            max_len: 127
        display_name:
          description: 
            zh_cn: Field 在 UModel 系统中的显示名称。值不能为空。
            en_us: The display name of the Element in UModel System. The value cannot be empty.
          type: semantic_string
        description:
          description: 
            zh_cn: Field 在 UModel 系统中的描述。
            en_us: The description of the Element in UModel System.
          type: semantic_string
        short_description:
          description: 
            zh_cn: Field 在 UModel 系统中的简短描述。
            en_us: The short description of the Element in UModel System.
          type: semantic_string
        launch_stage:
          description: 
            zh_cn: 元素的发布阶段。默认值为 preview。
            en_us: The launch stage of the Element. The default value is preview.
          type: string
          constraint:
            enum:
              values:
              - preview
              - beta
              - ga
              - deprecated
            default_value: "preview"
        type:
          description: 
            zh_cn: 字段的类型。值必须是以下之一：string、integer、float、boolean、time、json_object、json_array。值不能为空。
            en_us:  >
              The type of the Field. The value must be one of the following: string, integer, float, boolean, time, json_object, json_array. 
              The value cannot be empty.
          type: enum
          constraint:
            enum:
              values:
                - string
                - integer
                - float
                - boolean
                - time
                - json_object
                - json_array
            required: true
        value_mapping:
          description: 
            zh_cn: 对于枚举值的映射和解释，为了更好的展示映射值含义，对于 mapping 的 value 字段单独定义，value 包含4个字段："name"、"display_name"、"description"和"short_description"。例如，"status"字段的值是"1"，映射为 ：name 为 "running" ，display_name 为"运行中"，description 为"运行中......"，short_description 为"运行中..."。
            en_us: >
              For the mapping and interpretation of enumeration values, in order to better display the meaning of the mapping value, the value field of the mapping is defined separately. The value contains 4 fields: "name", "display_name", "description", and "short_description". For example, the value of the "status" field is "1", the mapping is: name is "running", display_name is "running", description is "running...", and short_description is "running...".
          type: map
          constraint:
            map:
              key:
                type: string
              value:
                type_ref: value_mapping:v1
        unit:
          description: 
            zh_cn: > 
              指标的单位，值格式为字符串。
              注意：单位仅用于展示，不会进行格式转换，例如 ms 不会自动根据大小转换为 s。
              最佳实践：首先配置 data_format ，在大部分可观测场景下，data_format 即可满足需求，unit 填写为空即可。
                      若不满足需求，一般建议 data_format 配置通用的 KMB， 并配置 unit 为特定类型。比如温度，可以配置 data_format 为 KMB， 并配置 unit 为 °C。
            en_us: >
              The unit of the Metric. The value format is a string.
              Note: The unit is only used for display and will not be converted, such as ms will not be automatically converted to s.
              Best practice: First configure data_format, in most observable scenarios, data_format can meet the needs, and unit can be filled in as empty.
              If it does not meet the needs, it is generally recommended to configure data_format to a common KMB, and configure unit to a specific type. For example, for temperature, you can configure data_format to KMB and configure unit to °C.
          type: string
        data_format:
          description: 
            zh_cn: >
              指标的格式化方式，值格式为字符串。支持的格式化选项：
              
              数值格式化：
              - KMB: 千、百万、十亿格式化，样例：K,Mil,Bil
              - milli: 处理为毫秒格式，样例：1,000,000
              
              存储格式化：
              - byte: 处理为字节格式，样例：B/KB/MB
              - bit: 处理为位格式，样例：b/Kb/Mb
              
              速率格式化：
              - byte_ies_sec: 每秒字节（byte per second）格式化，样例：B/s/KB/s/MB/s
              - bit_ies_sec: 每秒位（bit per second）格式化，样例：bps/Kbps/Mbps
              - iops: 输入输出操作每秒格式化，样例：io/s
              - reqps: 请求每秒格式化，样例：req/s
              
              百分比格式化：
              - percent: 百分比格式化，取值为1-100，样例：10%
              - percent_decimal: 百分比格式化，取值为0-1，样例：10%
              
              时间格式化：
              - localtime: 将时间戳转换为本地时间格式
              - localtimems: 毫秒时间转换为本地时间格式
              - localtimeus: 微秒时间转换为本地时间格式
              - localtimens: 纳秒时间转换为本地时间格式
              - UTC±n: 将时间戳转换为特定时区的时间
              
              持续时间（Duration）格式化：
              - dtdhms: 持续时间格式化为天、小时、分、秒，样例：d hh:mm:ss
              - dthms: 持续时间格式化为小时、分、秒，样例：hh:mm:ss
              - d: 按天格式化时间
              - h: 按小时格式化时间
              - m: 按分钟格式化时间
              - s: 按秒格式化时间
              - ms: 按毫秒格式化时间
              - us: 按微秒格式化时间
              - ns: 按纳秒格式化时间
            en_us: >
              The formatting method for metrics, value format is string. Supported formatting options:
              
              Numeric formatting:
              - KMB: Thousands, millions, billions formatting, example: K,Mil,Bil
              - milli: Process as millisecond format, example: 1,000,000
              
              Storage formatting:
              - byte: Process as byte format, example: B/KB/MB
              - bit: Process as bit format, example: b/Kb/Mb
              
              Rate formatting:
              - byte_ies_sec: Bytes per second formatting, example: B/s/KB/s/MB/s
              - bit_ies_sec: Bits per second formatting, example: bps/Kbps/Mbps
              - iops: Input/output operations per second formatting, example: io/s
              - reqps: Requests per second formatting, example: req/s
              
              Percentage formatting:
              - percent: Percentage formatting, value range is 1-100, example: 10%
              - percent_decimal: Percentage formatting, value range is 0-1, example: 10%
              
              Time formatting:
              - localtime: Convert timestamp to local time format
              - localtimems: Convert millisecond time to local time format
              - localtimeus: Convert microsecond time to local time format
              - localtimens: Convert nanosecond time to local time format
              - UTC±n: Convert timestamp to specific timezone time
              
              Duration formatting:
              - dtdhms: Format duration as days, hours, minutes, seconds, example: d hh:mm:ss
              - dthms: Format duration as hours, minutes, seconds, example: hh:mm:ss
              - d: Format time by days
              - h: Format time by hours
              - m: Format time by minutes
              - s: Format time by seconds
              - ms: Format time by milliseconds
              - us: Format time by microseconds
              - ns: Format time by nanoseconds
          type: string
          constraint:
            enum:
              values:
                - KMB
                - milli
                - byte
                - bit
                - byte_ies_sec
                - bit_ies_sec
                - iops
                - reqps
                - percent
                - percent_decimal
                - localtime
                - localtimems
                - localtimeus
                - localtimens
                - UTC-11
                - UTC-10
                - UTC-9
                - UTC-8
                - UTC-7
                - UTC-6
                - UTC-5
                - UTC-4
                - UTC-3
                - UTC-2
                - UTC-1
                - UTC+0
                - UTC+1
                - UTC+2
                - UTC+3
                - UTC+4
                - UTC+5
                - UTC+6
                - UTC+7
                - UTC+8
                - UTC+9
                - UTC+10
                - UTC+11
                - UTC+12
                - dtdhms
                - dthms
                - d
                - h
                - m
                - s
                - ms
                - us
                - ns
            default_value: KMB
        analysable:
          description: 
            zh_cn: 用于表示字段是否可分析，即作为Group By的列。默认值为false。
            en_us: Used to denote whether the field is analyzable, i.e., serving as a column for Group By. default value is false.
          type: bool
          constraint:
            default_value: false
        filterable:
          description: 
            zh_cn: 用于表示字段是否可过滤，即支持索引过滤。默认值为false。
            en_us: Used to indicate whether this field can support filtering, i.e., it supports indexed filtering. default value is false.
          type: bool
          constraint:
            default_value: false
        orderable:
          description: 
            zh_cn: 用于表示字段是否可排序。默认值为false。
            en_us: Used to indicate whether the field is sortable. default value is false.
          type: bool
          constraint:
            default_value: false
        default_order:
          description: 
            zh_cn: 用于表示字段的默认排序顺序。值必须是以下之一：asc、desc。默认值为asc。
            en_us: >
              Used to indicate the default sorting order of the field. The value must be one of the following: asc, desc. default value is asc.
          type: enum
          constraint:
            enum:
              values:
                - asc
                - desc
              default_value: asc
        pattern:
          description: 
            zh_cn: 正则表达式，用于定义字段的值范围（字符串）。
            en_us: Regular expression, used to define the range of values for this field (String).
          type: string
        max_length:
          description: 
            zh_cn: 字符串值的最大长度。仅适用于字符串类型。
            en_us: The max length of string value. Only valid for string type.
          type: integer
        example:
          description: 
            zh_cn: 字段值的示例。值可以为空。
            en_us: examples of the field value. The value can be empty.
          type: any
        max_value:
          description: 
            zh_cn: 字段的最大值。值可以为空。仅适用于整数和浮点类型。
            en_us: The maximum value of the field. The value can be empty. Only valid for integer and float types.
          type: number
        min_value:
          description: 
            zh_cn: 字段的最小值。值可以为空。仅适用于整数和浮点类型。
            en_us: The minimum value of the field. The value can be empty. Only valid for integer and float types.
          type: number
        default_value:
          description: 
            zh_cn: 字段的默认值。值可以为空。
            en_us: The default value of the field. The value can be empty.
          type: any
        icon:
          description: 
            zh_cn: Field 在 UModel 系统中的图标。值格式为'url'。
            en_us: The icon of the Element in UModel System. The value format is 'url'.
          type: string
          release_stage: experimental
          constraint:
            #pattern "^http[s]?://.*$"
        uri:
          description: 
            zh_cn: 用于表示该字段唯一标识。
            en_us: This field is used to represent the unique identifier of the field.
          type: string
          release_stage: experimental
          constraint:
            #pattern "^/.*$"
        tags:
          description: 
            zh_cn: 用于表示该 Field 的标签。
            en_us: This field is used to represent the tags of the Field.
          type: map
          constraint:
            map:
              key:
                type: string
                constraint:
                  #pattern '^\W*$'
              value:
                type: string
        properties:
          description: 
            zh_cn: 用于表示该 Field 的附加属性。
            en_us: This field is used to represent the additional properties of the Field.
          type: map
          constraint:
            map:
              key:
                type: string
                constraint:
                  #pattern '^\W*$'
              value:
                type: string
