<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📚 UModel 文档中心</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .main-content {
            padding: 30px;
        }

        .search-box {
            margin-bottom: 25px;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 12px 45px 12px 15px;
            font-size: 14px;
            border: 2px solid #e1e4e8;
            border-radius: 8px;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .search-icon {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #666;
            font-size: 16px;
        }

        .stats {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            justify-content: center;
        }

        .stat-card {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 15px 25px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(240, 147, 251, 0.3);
            min-width: 120px;
        }

        .stat-number {
            font-size: 1.8em;
            font-weight: 700;
            margin-bottom: 2px;
        }

        .stat-label {
            font-size: 0.85em;
            opacity: 0.9;
        }

        .docs-list {
            background: #f8f9fa;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #e1e4e8;
        }

        .category-section {
            margin-bottom: 0;
        }

        .category-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 20px;
            font-weight: 600;
            font-size: 1.1em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .category-icon {
            font-size: 1.2em;
        }

        .doc-item {
            background: white;
            border-bottom: 1px solid #e1e4e8;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.2s ease;
        }

        .doc-item:hover {
            background: #f1f8ff;
            border-left: 4px solid #667eea;
            padding-left: 16px;
        }

        .doc-item:last-child {
            border-bottom: none;
        }

        .doc-info {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .doc-icon {
            font-size: 1.5em;
            width: 40px;
            text-align: center;
        }

        .doc-details {
            flex: 1;
        }

        .doc-title {
            font-size: 1.1em;
            font-weight: 600;
            color: #333;
            margin-bottom: 3px;
        }

        .doc-description {
            font-size: 0.9em;
            color: #666;
            line-height: 1.4;
        }

        .doc-meta {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 0.85em;
            color: #888;
        }

        .doc-size {
            background: #e3f2fd;
            color: #1976d2;
            padding: 3px 8px;
            border-radius: 4px;
            font-weight: 500;
        }

        .doc-link {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 500;
            font-size: 0.9em;
            transition: all 0.3s ease;
        }

        .doc-link:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .no-results {
            text-align: center;
            padding: 40px 20px;
            color: #666;
        }

        .no-results-icon {
            font-size: 3em;
            margin-bottom: 15px;
            opacity: 0.3;
        }

        .footer {
            background: #f8f9fa;
            padding: 20px;
            text-align: center;
            color: #666;
            border-top: 1px solid #e1e4e8;
            font-size: 0.9em;
        }

        .update-info {
            background: #e3f2fd;
            color: #1976d2;
            padding: 8px 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 0.9em;
            text-align: center;
        }

        @media (max-width: 768px) {
            .header {
                padding: 20px;
            }

            .header h1 {
                font-size: 2em;
            }

            .main-content {
                padding: 20px;
            }

            .stats {
                flex-direction: column;
                align-items: center;
            }

            .doc-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .doc-info {
                width: 100%;
            }

            .doc-meta {
                justify-content: space-between;
                width: 100%;
            }
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 UModel 文档中心</h1>
            <p>探索 UModel 系统的完整文档和规范</p>
        </div>

        <div class="main-content">
            <div class="update-info">
                ℹ️ 本页面自动生成于 2026-03-06 16:32，包含 20 个文档，总大小 1308 KB
            </div>

            <div class="search-box">
                <input type="text" class="search-input" placeholder="搜索文档..." id="searchInput">
                <span class="search-icon">🔍</span>
            </div>

            <div class="stats">
                <div class="stat-card">
                    <div class="stat-number" id="totalDocs">20</div>
                    <div class="stat-label">文档总数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="totalSize">1308</div>
                    <div class="stat-label">总大小 (KB)</div>
                </div>
            </div>

            <div class="docs-list" id="docsList">
                <!-- 文档列表将通过 JavaScript 动态生成 -->
            </div>

            <div class="no-results hidden" id="noResults">
                <div class="no-results-icon">📄</div>
                <h3>未找到匹配的文档</h3>
                <p>请尝试使用不同的关键词搜索</p>
            </div>
        </div>

        <div class="footer">
            <p>&copy; 2024 UModel 文档中心. 自动生成于 2026-03-06 16:32</p>
            <p style="margin-top: 8px; font-size: 0.8em; opacity: 0.7;">
                使用 <code>python scripts/converters/generate_index.py</code> 重新生成此页面
            </p>
        </div>
    </div>

            {

                        "icon": "📊",

                        "category": "telemetry"

            {

                        "title": "profile_set",
                        "subtitle": "观测数据",
                        "description": "ProfileSet 用于定义 Profile 数据集，Profile 数据集是具有相同属性的 Profile 数据的集合，一般用于描述某类可观测实体的一类 Profile 数据，例如主机的 CPU、内存、磁盘等 Profile 数据。",

                        "description": "EntitySource 用于定义特定 Entity 数据的导入任务以及其源数据存储（如 SLS LogStore / MetricStore）。",

            },
            {

                        "subtitle": "存储",
                        "description": "外部存储，用于存放自定义存储的详细信息。",

            },
            {

                        "title": "sls_logstore",

                        "icon": "💾",
                        "size": 42,

            {

                        "title": "sls_metricstore",
                        "subtitle": "存储",

            {

                        "title": "runbook_set",

                        "description": "RunbookSet 用于定义实体、数据的操作手册集合，包含分析工具、操作指南和最佳实践。",
                        "icon": "📚",

                        "category": "runbook"
            },
            {
                        "filename": "explorer.html",
                        "title": "explorer",
                        "subtitle": "通用",
                        "description": "UModel 系统文档",
                        "icon": "📄",
                        "size": 39,
                        "category": "general"
            }
];

        // 按类别分组文档
        function groupDocsByCategory(docsToGroup) {
            const grouped = {};
            docsToGroup.forEach(doc => {
                if (!grouped[doc.category]) {
                    grouped[doc.category] = [];
                }
                grouped[doc.category].push(doc);
            });
            return grouped;
        }

        // 渲染文档列表
        function renderDocs(docsToRender = docs) {
            const docsList = document.getElementById('docsList');
            const noResults = document.getElementById('noResults');
            
            if (docsToRender.length === 0) {
                docsList.innerHTML = '';
                noResults.classList.remove('hidden');
                return;
            }
            
            noResults.classList.add('hidden');
            
            const groupedDocs = groupDocsByCategory(docsToRender);
            const categoryOrder = ['entity', 'telemetry', 'connection', 'storage', 'runbook', 'general'];
            
            let html = '';
            
            categoryOrder.forEach(category => {
                if (groupedDocs[category] && groupedDocs[category].length > 0) {
                    const categoryName = getCategoryName(category);
                    const categoryIcon = groupedDocs[category][0].icon;
                    
                    html += `
                        <div class="category-section">
                            <div class="category-header">
                                <span class="category-icon">${categoryIcon}</span>
                                <span>${categoryName} (${groupedDocs[category].length})</span>
                            </div>
                    `;
                    
                    groupedDocs[category].forEach(doc => {
                        html += `
                            <div class="doc-item">
                                <div class="doc-info">
                                    <div class="doc-icon">${doc.icon}</div>
                                    <div class="doc-details">
                                        <div class="doc-title">${doc.title}</div>
                                        <div class="doc-description">${doc.description}</div>
                                    </div>
                                </div>
                                <div class="doc-meta">
                                    <span class="doc-size">${doc.size} KB</span>
                                    <a href="${doc.filename}" class="doc-link">查看 →</a>
                                </div>
                            </div>
                        `;
                    });
                    
                    html += '</div>';
                }
            });
            
            docsList.innerHTML = html;
        }

        // 获取类别名称
        function getCategoryName(category) {
            const categoryNames = {
                'entity': '实体',
                'telemetry': '观测数据',
                'storage': '存储系统',
                'connection': 'Link 连接',
                'runbook': '操作手册',
                'general': '未分类'
            };
            return categoryNames[category] || category;
        }

        // 搜索功能
        function setupSearch() {
            const searchInput = document.getElementById('searchInput');
            
            searchInput.addEventListener('input', (e) => {
                const searchTerm = e.target.value.toLowerCase().trim();
                
                if (searchTerm === '') {
                    renderDocs(docs);
                    return;
                }
                
                const filteredDocs = docs.filter(doc => 
                    doc.title.toLowerCase().includes(searchTerm) ||
                    doc.subtitle.toLowerCase().includes(searchTerm) ||
                    doc.description.toLowerCase().includes(searchTerm) ||
                    getCategoryName(doc.category).toLowerCase().includes(searchTerm)
                );
                
                renderDocs(filteredDocs);
            });
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            renderDocs();
            setupSearch();
        });
    </script>
</body>
</html>
