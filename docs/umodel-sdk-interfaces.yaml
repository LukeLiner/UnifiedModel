# UModel SDK Interface Definitions
# Version: 1.0.0
# This file provides machine-readable interface definitions for code generation

version: "1.0.0"
description: "UModel SDK 接口定义规范"

# 基础类型映射
type_mappings:
  string:
    go: "string"
    python: "str"
    java: "String"
    typescript: "string"
    rust: "String"
    csharp: "string"
    
  number:
    go: "float64"
    python: "float"
    java: "Double"
    typescript: "number"
    rust: "f64"
    csharp: "double"
    
  integer:
    go: "int64"
    python: "int"
    java: "Long"
    typescript: "number"
    rust: "i64"
    csharp: "long"
    
  boolean:
    go: "bool"
    python: "bool"
    java: "Boolean"
    typescript: "boolean"
    rust: "bool"
    csharp: "bool"
    
  object:
    go: "map[string]interface{}"
    python: "Dict[str, Any]"
    java: "Map<String, Object>"
    typescript: "Record<string, any>"
    rust: "HashMap<String, Box<dyn Any>>"
    csharp: "Dictionary<string, object>"
    
  array:
    go: "[]interface{}"
    python: "List[Any]"
    java: "List<Object>"
    typescript: "any[]"
    rust: "Vec<Box<dyn Any>>"
    csharp: "List<object>"
    
  time:
    go: "time.Time"
    python: "datetime"
    java: "java.time.Instant"
    typescript: "Date"
    rust: "chrono::DateTime<Utc>"
    csharp: "DateTime"
    
  json:
    go: "json.RawMessage"
    python: "Union[dict, list, str, int, float, bool, None]"
    java: "JsonNode"
    typescript: "any"
    rust: "serde_json::Value"
    csharp: "JToken"
    
  any:
    go: "interface{}"
    python: "Any"
    java: "Object"
    typescript: "any"
    rust: "Box<dyn Any>"
    csharp: "object"

# 特殊类型定义
special_types:
  SemanticString:
    description: "支持多语言的语义字符串"
    properties:
      zh_cn:
        type: string
        required: false
        description: "中文（简体）"
      en_us:
        type: string
        required: false
        description: "英文（美国）"
    methods:
      - name: toString
        returns: string
        description: "获取字符串表示（优先返回中文，其次英文）"
        implementation_notes:
          - "如果 zh_cn 不为空，返回 zh_cn"
          - "否则返回 en_us"
          - "如果都为空，返回空字符串"
      - name: get
        parameters:
          - name: lang
            type: string
        returns: string
        description: "根据语言代码获取对应文本"
    serialization:
      json:
        - "支持字符串格式：直接解析为所有语言相同值"
        - "支持对象格式：解析为包含 zh_cn/en_us 的对象"
      yaml:
        - "同 JSON 格式支持"
        
  LinkEndpoint:
    description: "表示链接的端点信息"
    properties:
      domain:
        type: string
        required: true
        description: "域名称"
      kind:
        type: string
        required: true
        description: "对象类型"
      name:
        type: string
        required: true
        description: "对象名称"
      filter:
        type: string
        required: false
        description: "过滤条件"
        
  Schema:
    description: "Schema 版本信息"
    properties:
      version:
        type: string
        required: true
        description: "版本号（如 v1.0.0）"
        
  Metadata:
    description: "对象元数据"
    properties:
      name:
        type: string
        required: true
        description: "对象名称"
      labels:
        type: object
        required: false
        description: "标签键值对"
      annotations:
        type: object
        required: false
        description: "注解键值对"

# 接口定义
interfaces:
  UModelObject:
    description: "所有 UModel 对象的基础接口"
    methods:
      - name: getKind
        returns: string
        description: "获取对象的类型标识"
        naming_conventions:
          go: "GetKind"
          python: "get_kind"
          java: "getKind"
          typescript: "getKind"
          rust: "get_kind"
          csharp: "GetKind"
          
      - name: validate
        returns: 
          type: error
          nullable: true
        description: "验证对象是否符合 schema 定义"
        naming_conventions:
          go: "Validate"
          python: "validate"
          java: "validate"
          typescript: "validate"
          rust: "validate"
          csharp: "Validate"
        error_types:
          - ValidationError
          
  UModelCoreObject:
    extends: UModelObject
    description: "core 目录下所有对象的接口"
    methods:
      - name: getSchema
        returns:
          type: Schema
          nullable: true
        description: "获取对象的 Schema 信息"
        naming_conventions:
          go: "GetSchema"
          python: "get_schema"
          java: "getSchema"
          typescript: "getSchema"
          rust: "get_schema"
          csharp: "GetSchema"
          
      - name: getMetadata
        returns:
          type: Metadata
          nullable: true
        description: "获取对象的 Metadata 信息"
        naming_conventions:
          go: "GetMetadata"
          python: "get_metadata"
          java: "getMetadata"
          typescript: "getMetadata"
          rust: "get_metadata"
          csharp: "GetMetadata"
          
  UModelLinkObject:
    extends: UModelCoreObject
    description: "所有 link 类型对象的接口"
    methods:
      - name: getSrc
        returns:
          type: LinkEndpoint
          nullable: true
        description: "获取源端点信息"
        naming_conventions:
          go: "GetSrc"
          python: "get_src"
          java: "getSrc"
          typescript: "getSrc"
          rust: "get_src"
          csharp: "GetSrc"
          
      - name: getDest
        returns:
          type: LinkEndpoint
          nullable: true
        description: "获取目标端点信息"
        naming_conventions:
          go: "GetDest"
          python: "get_dest"
          java: "getDest"
          typescript: "getDest"
          rust: "get_dest"
          csharp: "GetDest"

# 功能模块定义
modules:
  Parser:
    description: "基础解析模块"
    functions:
      - name: parseJSON
        parameters:
          - name: data
            type: bytes
            description: "JSON 数据"
          - name: target
            type: type_reference
            description: "目标类型"
        returns: object
        errors:
          - ParseError
        description: "从 JSON 数据解析对象"
        
      - name: parseYAML
        parameters:
          - name: data
            type: bytes
            description: "YAML 数据"
          - name: target
            type: type_reference
            description: "目标类型"
        returns: object
        errors:
          - ParseError
        description: "从 YAML 数据解析对象"
        
  AutoParser:
    description: "自动类型检测模块"
    functions:
      - name: parseUModelJSON
        parameters:
          - name: data
            type: bytes
            description: "JSON 数据"
        returns: UModelCoreObject
        errors:
          - ParseError
          - UnknownTypeError
        description: "自动检测类型并解析 JSON"
        process:
          - "预解析获取 kind 和 schema.version"
          - "构建类型键 {kind}:{version}"
          - "从类型注册表查找对应类型"
          - "支持版本兼容（v0.x.x -> v1.0.0）"
          - "创建实例并完整解析"
          
      - name: parseUModelYAML
        parameters:
          - name: data
            type: bytes
            description: "YAML 数据"
        returns: UModelCoreObject
        errors:
          - ParseError
          - UnknownTypeError
        description: "自动检测类型并解析 YAML"
        
  TypeRegistry:
    description: "类型注册表"
    structure:
      registry:
        type: "Map<string, Factory>"
        description: "类型键到工厂函数的映射"
    functions:
      - name: register
        parameters:
          - name: typeKey
            type: string
            description: "类型键（格式：{kind}:{version}）"
          - name: factory
            type: function
            description: "创建实例的工厂函数"
        returns: void
        description: "注册新类型"
        
      - name: create
        parameters:
          - name: typeKey
            type: string
        returns: object
        errors:
          - UnknownTypeError
        description: "根据类型键创建实例"
        
      - name: exists
        parameters:
          - name: typeKey
            type: string
        returns: boolean
        description: "检查类型是否已注册"
        
  Utils:
    description: "工具函数模块"
    functions:
      - name: isCoreObject
        parameters:
          - name: obj
            type: any
        returns: boolean
        description: "判断对象是否实现了 UModelCoreObject 接口"
        
      - name: isLinkObject
        parameters:
          - name: obj
            type: any
        returns: boolean
        description: "判断对象是否实现了 UModelLinkObject 接口"
        
      - name: getObjectMetadata
        parameters:
          - name: obj
            type: any
        returns:
          type: Metadata
          nullable: true
        description: "获取任意 UModel 对象的 Metadata"
        
      - name: getObjectSchema
        parameters:
          - name: obj
            type: any
        returns:
          type: Schema
          nullable: true
        description: "获取任意 UModel 对象的 Schema"
        
      - name: getLinkEndpoints
        parameters:
          - name: obj
            type: any
        returns:
          type: tuple
          elements:
            - type: LinkEndpoint
              nullable: true
            - type: LinkEndpoint
              nullable: true
        description: "获取 Link 对象的源和目标端点"

# 错误定义
errors:
  ValidationError:
    description: "对象验证失败"
    fields:
      - name: field
        type: string
        description: "出错的字段路径"
      - name: reason
        type: string
        description: "错误原因"
        
  ParseError:
    description: "解析失败"
    fields:
      - name: position
        type: integer
        description: "错误位置"
      - name: detail
        type: string
        description: "错误详情"
        
  UnknownTypeError:
    description: "未知的类型"
    fields:
      - name: typeKey
        type: string
        description: "请求的类型键"
      - name: availableTypes
        type: "array<string>"
        description: "可用的类型列表"

# 命名约定
naming_conventions:
  type_names:
    pattern: "{Kind}{Version}"
    examples:
      - "MetricSetV100"
      - "ServiceLinkV200"
      - "DatabaseSchemaV110"
      
  field_names:
    schema: "snake_case"
    language_mappings:
      go:
        exported: "PascalCase"
        unexported: "camelCase"
      python: "snake_case"
      java: "camelCase"
      typescript: "camelCase"
      rust: "snake_case"
      csharp: "PascalCase"
      
  method_names:
    go: "PascalCase"
    python: "snake_case"
    java: "camelCase"
    typescript: "camelCase"
    rust: "snake_case"
    csharp: "PascalCase"

# 序列化配置
serialization:
  json:
    field_naming: "snake_case"
    omit_empty: true
    null_handling: "omit"
    
  yaml:
    field_naming: "snake_case"
    omit_empty: true
    null_handling: "omit"
    inline_tag: "inline"
    
# SDK 功能要求
sdk_requirements:
  mandatory:
    - "所有基础接口实现"
    - "JSON/YAML 解析和序列化"
    - "自动类型检测"
    - "类型注册表"
    - "基础验证功能"
    - "错误处理"
    
  optional:
    - "流式解析"
    - "Schema 验证器"
    - "类型转换工具"
    - "调试工具"
    - "性能优化"
    
# 版本兼容性规则
version_compatibility:
  rules:
    - pattern: "v0.x.x"
      maps_to: "v1.0.0"
      description: "预发布版本映射到首个稳定版本"
      
    - pattern: "v1.x.x"
      compatible_range: ">=v1.0.0 <v2.0.0"
      description: "v1 主版本内向后兼容"
      
    - pattern: "vX.Y.Z"
      compatible_range: ">=vX.Y.0 <vX+1.0.0"
      description: "主版本内兼容，次版本可增加功能"

# 代码生成器配置
code_generation:
  templates:
    interface_template: |
      // {interface_name} {description}
      type {interface_name} interface {
          {extends}
          {methods}
      }
      
    method_template: |
      // {method_name} {description}
      {method_name}({parameters}) {returns}
      
    struct_template: |
      // {struct_name} {description}
      type {struct_name} struct {
          {fields}
      }
      
    field_template: |
      {field_name} {field_type} `json:"{json_tag}" yaml:"{yaml_tag}"` 