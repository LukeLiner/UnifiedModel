                                type: object
                                properties:
                                  zh_cn:
                                    description:
                                      zh_cn: 中文描述
                                      en_us: Chinese description
                                    type: string
                                  en_us:
                                    description:
                                      zh_cn: 英文描述
                                      en_us: English description
                                    type: string
                              launch_stage:
