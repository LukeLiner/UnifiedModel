                                      zh_cn: 中文描述
                                      en_us: Chinese description
                                    type: string
                                  en_us:
                                    description:
                                      zh_cn: 英文描述
                                      en_us: English description
                                    type: string
                              description:
                                description:
                                  zh_cn: Field 在 UModel 系统中的描述。
                                  en_us: The description of the Element in UModel System.
                                type: object
                                properties:
                                  zh_cn:
                                    description:
                                      zh_cn: 中文描述
                                      en_us: Chinese description
                                    type: string
                                  en_us:
                                    description:
                                      zh_cn: 英文描述
                                      en_us: English description
